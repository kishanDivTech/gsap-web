<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
</head>

<body>

    <h1 id="count">0</h1>

    <button onclick="plus()">
        +
    </button>

    <button onclick="minus()">
        -
    </button>

    <script>

        let num = 0;

        function plus() {

            num++;

            document.getElementById("count").innerText = num;
        }

        function minus() {

            num--;

            document.getElementById("count").innerText = num;
        }

    </script>

</body>

</html>
